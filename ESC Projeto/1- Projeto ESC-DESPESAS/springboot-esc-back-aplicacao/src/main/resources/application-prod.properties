# =============================================
# CONFIGURACOES DE PRODUCAO (PROD)
# =============================================
# Para ativar este profile, use: --spring.profiles.active=prod
#
# IMPORTANTE: Substituir as credenciais por variaveis de ambiente em producao!
# Exemplo: spring.datasource.password=${DB_PASSWORD}

#Configuracoes Ambiente
server.port=8020

#Configuracao de conexao SQL-Server - PRODUCAO
# RECOMENDACAO: Use variaveis de ambiente para credenciais
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=BancoScmThiago;encrypt=true;trustServerCertificate=false}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

#Configuracoes HikariCP - Pool de Conexoes (otimizado para prod)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=ESCHikariPool-PROD

#Configuracoes de Log - menos verbose para producao
logging.level.br.com.esc.backend=INFO
logging.level.org.springframework.web=WARN
logging.level.com.zaxxer.hikari=WARN

#Configuracao Backup - PRODUCAO
prop.basePrincipal=${BACKUP_BASE_PRINCIPAL:BancoScmThiago}
prop.baseBackup=${BACKUP_BASE_BACKUP:bkp_BancoScmThiagoPrincipal}

#Configuracoes de Seguranca
server.error.include-message=never
server.error.include-stacktrace=never

