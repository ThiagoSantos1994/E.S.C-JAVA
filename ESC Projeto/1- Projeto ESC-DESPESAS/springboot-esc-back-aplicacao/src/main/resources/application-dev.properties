# =============================================
# CONFIGURACOES DE DESENVOLVIMENTO (DEV)
# =============================================
# Para ativar este profile, use: --spring.profiles.active=dev

#Configuracoes Ambiente
server.port=8020

#Configuracao de conexao SQL-Server - DESENVOLVIMENTO
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=BancoScmThiago;encrypt=false;trustServerCertificate=true;sslProtocol=TLSv1.2
spring.datasource.username=sa
spring.datasource.password=13509
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

#Configuracoes HikariCP - Pool de Conexoes (menor para dev)
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=ESCHikariPool-DEV

#Configuracoes de Log - mais detalhado para debug
logging.level.br.com.esc.backend=DEBUG
logging.level.org.springframework.web=DEBUG

#Configuracao Backup - DESENVOLVIMENTO
prop.basePrincipal=BancoScmThiago
prop.baseBackup=bkp_BancoScmThiagoPrincipal

